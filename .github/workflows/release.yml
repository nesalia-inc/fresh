name: Release

on:
  release:
    types: [published]

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate version matches tag
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          PYPROJECT_VERSION=$(grep -m1 '^version =' pyproject.toml | sed 's/.*= *"\(.*\)"/\1/')

          if [ "$TAG_NAME" != "v$PYPROJECT_VERSION" ]; then
            echo "Error: Tag version '$TAG_NAME' does not match pyproject.toml version '$PYPROJECT_VERSION'"
            exit 1
          fi

          echo "Version validated: $PYPROJECT_VERSION"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3

  typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '${{ matrix.python-version }}'
          cache: 'pip'
      - run: pip install -e .[dev]
      - run: mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '${{ matrix.python-version }}'
          cache: 'pip'
      - run: pip install -e ".[dev]" pytest-cov
      - run: pytest --cov=fresh --cov-report=xml --cov-report=term
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  build:
    runs-on: ubuntu-latest
    needs: [validate-version, lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install build uv
      - run: rm -rf dist/
      - run: python -m build
      - run: ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    runs-on: ubuntu-latest
    needs: [build]
    environment: production
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install twine
      - run: twine upload --skip-existing --username __token__ --password "${{ secrets.PYPI_TOKEN }}" dist/*